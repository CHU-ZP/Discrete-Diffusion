seed: 0

dataset:
  name: modelnet10_voxel
  # Voxel token classes: 0 = empty, 1 = occupied.
  num_classes: 2
  shape: [64, 64, 64]
  conditional: true
  # Conditional labels are subtype ids produced by scripts/build_modelnet_subtypes.py.
  # The default subtype recipe uses 3 subtypes for each of the 4 original ModelNet classes.
  num_labels: 12
  cache_path: data/modelnet10_voxel_64_top4_subtypes.npz

diffusion:
  timesteps: 100
  schedule: linear
  beta_start: 0.005
  beta_end: 0.15
  transition: uniform

model:
  name: unet3d
  base_channels: 32
  channel_mults: [1, 2, 4]
  num_res_blocks: 2
  dropout: 0.1

train:
  batch_size: 2
  steps: 50000
  lr: 0.0002
  weight_decay: 0.01
  # Automatically up-weight rare voxel tokens. For binary occupancy this raises
  # the occupied class loss relative to the dominant empty class.
  token_loss_weights: auto
  max_token_loss_weight: 8.0
  log_every: 100
  sample_every: 1000
  sample_batch_size: 12
  num_workers: 2
  device: auto

output:
  run_dir: runs/voxel_modelnet10_64_subtypes
  sample_dir: outputs/voxel_modelnet10_64_subtypes
